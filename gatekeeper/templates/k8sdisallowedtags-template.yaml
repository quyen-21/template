apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: k8sdisallowedtags
spec:
  crd:
    spec:
      names:
        kind: K8sDisallowedTags
      validation:
        openAPIV3Schema:
          type: object
          properties:
            tags:
              type: array
              items:
                type: string
  targets:
    - target: admission.k8s.gatekeeper.sh
      rego: |
        package k8sdisallowedtags

        violation[{"msg": msg}] {
          container := input_containers[_]
          tag := input.parameters.tags[_]
          endswith(container.image, concat(":", ["", tag]))
          msg := sprintf("container <%v> has disallowed image tag: %v", [container.name, container.image])
        }

        violation[{"msg": msg}] {
          container := input_containers[_]
          not contains(container.image, ":")
          not contains(container.image, "@")
          msg := sprintf("container <%v> does not specify an image tag: %v", [container.name, container.image])
        }

        input_containers[c] { c := input.review.object.spec.containers[_] }
        input_containers[c] { c := input.review.object.spec.initContainers[_] }
